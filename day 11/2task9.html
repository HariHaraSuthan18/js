<!DOCTYPE html>
<html>
<head>
    <title>Cab Fare Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
        }

        .card {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div class="card">

        <h2>Cab Fare Calculator</h2>

        <input type="number" id="distance"
               placeholder="Enter Distance in KM">

        <br>

        <button onclick="calculateFare()">
            Calculate Fare
        </button>

        <div id="result"></div>

    </div>

    <script>

        function calculateFare() {

            let distance = Number(document.getElementById("distance").value);

            let fare = 0;

            if(distance <= 5) {

                fare = distance * 20;

            }
            else if(distance <= 10) {

                fare = (5 * 20) + ((distance - 5) * 15);

            }
            else {

                fare = (5 * 20) + (5 * 15) + ((distance - 10) * 10);

            }

            document.getElementById("result").innerHTML =
                "Distance : " + distance + " KM<br>" +
                "Total Fare : ₹" + fare;

            console.log("Distance :", distance);
            console.log("Fare :", fare);

            console.table({
                Distance: distance,
                Fare: fare
            });
        }

    </script>

</body>
</html>
