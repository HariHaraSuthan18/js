<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#333;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#555;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Traffic Signal System</h2>

    <input type="text" id="color" placeholder="Enter Signal Color">

    <button onclick="checkSignal()">Check Signal</button>

    <div id="result"></div>
</div>

<script>
function checkSignal(){

    let color = document.getElementById("color").value.toLowerCase();
    let message;

    switch(color){

        case "red":
            message = "Stop";
            break;

        case "yellow":
            message = "Ready";
            break;

        case "green":
            message = "Go";
            break;

        default:
            message = "Invalid Color";
    }

    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>
