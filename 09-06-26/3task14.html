<!DOCTYPE html>
<html>
<head>
    <title>Loan Eligibility Checker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#eef8f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:370px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        #result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Loan Eligibility Checker</h2>

    <input type="number" id="age" placeholder="Enter Age">

    <input type="number" id="salary" placeholder="Enter Salary">

    <input type="number" id="experience" placeholder="Enter Experience (Years)">

    <button onclick="checkEligibility()">Check Eligibility</button>

    <div id="result"></div>
</div>

<script>
function checkEligibility(){

    let age = Number(document.getElementById("age").value);
    let salary = Number(document.getElementById("salary").value);
    let experience = Number(document.getElementById("experience").value);

    if(age >= 21 && salary >= 25000 && experience >= 2){
        document.getElementById("result").innerHTML =
        "Eligible for Loan";
    }
    else{
        document.getElementById("result").innerHTML =
        "Not Eligible for Loan";
    }
}
</script>

</body>
</html>
