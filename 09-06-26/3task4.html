<!DOCTYPE html>
<html>
<head>
    <title>Simple ATM</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        #result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Simple ATM</h2>

    <input type="number" id="amount" placeholder="Enter Withdrawal Amount">

    <button onclick="withdrawMoney()">Withdraw</button>

    <div id="result"></div>
</div>

<script>
function withdrawMoney(){

    let balance = 10000;
    let amount = Number(document.getElementById("amount").value);

    if(amount <= balance){
        let remainingBalance = balance - amount;

        document.getElementById("result").innerHTML =
            "Withdrawal Successful<br>" +
            "Remaining Balance: ₹" + remainingBalance;
    }
    else{
        document.getElementById("result").innerHTML =
            "Insufficient Funds";
    }
}
</script>

</body>
</html>
