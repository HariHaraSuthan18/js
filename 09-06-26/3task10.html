<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Bill Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#fff8e7;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:350px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            margin-bottom:15px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#ff9800;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#f57c00;
        }

        #result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
            color:#222;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Restaurant Bill</h2>

    <input type="number" id="foodCost" placeholder="Enter Food Cost">

    <button onclick="calculateBill()">Calculate Bill</button>

    <div id="result"></div>
</div>

<script>
function calculateBill(){

    let foodCost = Number(document.getElementById("foodCost").value);
    let discount = 0;

    if(foodCost > 2000){
        discount = foodCost * 0.10;
    }

    let finalBill = foodCost - discount;

    document.getElementById("result").innerHTML =
        "Discount: ₹" + discount + "<br>" +
        "Final Bill: ₹" + finalBill;
}
</script>

</body>
</html>
