<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<style>
body{
    font-family: Arial;
    background:#f5f0ff;
    text-align:center;
}

.container{
    width:520px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px gray;
}

.book{
    background:#f3e8ff;
    padding:10px;
    margin:8px;
    border-radius:8px;
    cursor:pointer;
}

.book:hover{
    background:#e0ccff;
}

.card{
    margin-top:20px;
    background:#faf5ff;
    padding:15px;
    border-radius:10px;
    display:none;
}

button{
    padding:10px;
    background:#6a0dad;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#4b0082;
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

<h2>📚 Library Management System</h2>

<h3>Books</h3>
<div id="bookList"></div>

<h3>Total Book Value</h3>
<p id="totalValue"></p>

<h3>Books Above ₹500</h3>
<p id="above500"></p>

<div class="card" id="card">
    <h3 id="name"></h3>
    <p id="author"></p>
    <p id="price"></p>
    <p id="category"></p>

    <button onclick="issueBook()">Issue Book</button>
</div>

<div id="msg"></div>

</div>

<script>

// 1. Book array
const books = [
    { bookId: 1, bookName: "JavaScript Basics", author: "John", price: 450, category: "Programming" },
    { bookId: 2, bookName: "Advanced Java", author: "James", price: 650, category: "Programming" },
    { bookId: 3, bookName: "Physics World", author: "Newton", price: 550, category: "Science" },
    { bookId: 4, bookName: "Story Book", author: "Ravi", price: 300, category: "Fiction" },
    { bookId: 5, bookName: "Math Master", author: "Ram", price: 700, category: "Education" }
];

let selectedBook = null;

// 2. Display book names
let list = document.getElementById("bookList");

books.forEach((b, index)=>{
    list.innerHTML += `
        <div class="book" onclick="selectBook(${index})">
            📖 ${b.bookName}
        </div>
    `;
});

// 3. Total book value
let total = books.reduce((sum,b)=>sum + b.price,0);
document.getElementById("totalValue").innerText = "₹ " + total;

// 4. Books above ₹500
let above500 = books.filter(b => b.price > 500)
.map(b => b.bookName);

document.getElementById("above500").innerText =
above500.join(", ");

// 5. Select book
function selectBook(index){

    selectedBook = books[index];

    document.getElementById("card").style.display = "block";

    document.getElementById("name").innerText =
        "Book: " + selectedBook.bookName;

    document.getElementById("author").innerText =
        "Author: " + selectedBook.author;

    document.getElementById("price").innerText =
        "Price: ₹" + selectedBook.price;

    document.getElementById("category").innerText =
        "Category: " + getCategory(selectedBook.category);

    document.getElementById("msg").innerText = "";
}

// 6. Switch statement (category)
function getCategory(category){

    switch(category){
        case "Programming":
            return "Coding & Development 💻";
        case "Science":
            return "Science Books 🔬";
        case "Fiction":
            return "Story & Novel 📖";
        case "Education":
            return "Study Materials 🎓";
        default:
            return "General";
    }
}

// 7. Issue book function
function issueBook(){

    if(selectedBook){
        showMessage(selectedBook, confirmIssue);
    }
}

function showMessage(book, callback){
    callback(book);
}

function confirmIssue(book){
    document.getElementById("msg").innerText =
    "✅ Book Issued Successfully: " + book.bookName;
}

</script>

</body>
</html>
