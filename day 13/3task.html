<!DOCTYPE html>
<html>
<head>
<title>Food Order System</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
    text-align:center;
}

.container{
    width:450px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.food{
    background:#fff3e6;
    padding:10px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.food:hover{
    background:#ffe0b3;
    transform:scale(1.03);
}

.card{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#f0fff0;
    display:none;
}

button{
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

#msg{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

<h2>🍔 Food Order System</h2>

<!-- Food List (NO dropdown) -->
<div id="foodList"></div>

<!-- Detail Card -->
<div class="card" id="card">
    <h3 id="name"></h3>
    <p id="price"></p>
    <p id="category"></p>

    <button onclick="placeOrder()">Order Now</button>
</div>

<div id="msg"></div>

</div>

<script>

const foodItems = [
    { id: 1, foodName: "Pizza", price: 350, category: "Fast Food" },
    { id: 2, foodName: "Burger", price: 180, category: "Fast Food" },
    { id: 3, foodName: "Biryani", price: 250, category: "Main Course" },
    { id: 4, foodName: "Ice Cream", price: 120, category: "Dessert" },
    { id: 5, foodName: "Pasta", price: 220, category: "Italian" }
];

let selectedFood = null;

// show food cards
let list = document.getElementById("foodList");

foodItems.forEach(f=>{
    list.innerHTML += `
        <div class="food" onclick="showFood(${f.id})">
            🍽️ ${f.foodName} - ₹${f.price}
        </div>
    `;
});

// show selected food
function showFood(id){

    selectedFood = foodItems.find(f => f.id === id);

    document.getElementById("card").style.display = "block";

    document.getElementById("name").innerText = selectedFood.foodName;
    document.getElementById("price").innerText = "Price: ₹" + selectedFood.price;
    document.getElementById("category").innerText = "Category: " + selectedFood.category;

    document.getElementById("msg").innerText = "";
}

// callback order
function placeOrder(){
    confirmOrder(selectedFood, orderSuccess);
}

function confirmOrder(food, callback){
    callback(food);
}

function orderSuccess(food){
    document.getElementById("msg").innerText =
    "✅ Order Confirmed! " + food.foodName + " will be delivered soon.";
}

</script>

</body>
</html>
