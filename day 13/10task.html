<!DOCTYPE html>
<html>
<head>
<title>Mobile Sales System</title>

<style>
body{
    font-family: Arial;
    background:#eef2ff;
    text-align:center;
}

.container{
    width:600px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px gray;
}

.card{
    background:#f0f4ff;
    margin:8px;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.card:hover{
    background:#dfe7ff;
}

#output{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

button{
    padding:10px;
    background:#4a6cf7;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2> Mobile Sales System</h2>

<h3>Mobiles</h3>
<div id="mobileList"></div>

<h3>Total Stock Value</h3>
<p id="totalValue"></p>

<h3>Mobiles Above ₹20,000</h3>
<p id="above"></p>

<div id="output"></div>

</div>

<script>

// 1. Array of mobiles
const mobiles = [
  { brand: "Apple", model: "iPhone 14", price: 80000, stock: 5 },
  { brand: "Samsung", model: "S23", price: 65000, stock: 8 },
  { brand: "Redmi", model: "Note 12", price: 15000, stock: 20 },
  { brand: "OnePlus", model: "11R", price: 45000, stock: 10 },
  { brand: "Vivo", model: "V27", price: 25000, stock: 6 }
];

let list = document.getElementById("mobileList");

// 2. Display all mobile names (FOR LOOP)
for (let i = 0; i < mobiles.length; i++) {
    list.innerHTML += `
        <div class="card" onclick="showReport(${i})">
             ${mobiles[i].model}
        </div>
    `;
}

// 3. Total stock value (function + return)
function totalStockValue() {
    let total = 0;

    for (let i = 0; i < mobiles.length; i++) {
        total += mobiles[i].price * mobiles[i].stock;
    }

    return total;
}

document.getElementById("totalValue").innerText =
"₹ " + totalStockValue();

// 4. Mobiles above ₹20000 (IF + FOR)
let text = "";
for (let i = 0; i < mobiles.length; i++) {
    if (mobiles[i].price > 20000) {
        text += mobiles[i].model + " ";
    }
}
document.getElementById("above").innerText = text;

// 5. Switch statement for brand category
function getBrand(brand){
    switch(brand){
        case "Apple":
            return "Premium ";
        case "Samsung":
            return "Flagship ";
        case "OnePlus":
            return "Performance ";
        case "Vivo":
            return "Camera ";
        case "Redmi":
            return "Budget ";
        default:
            return "Unknown";
    }
}

// 6. Callback function (sales report)
function generateReport(mobile, callback){
    callback(mobile);
}

function showReport(mobileIndex){

    let mobile = mobiles[mobileIndex];

    generateReport(mobile, function(m){

        document.getElementById("output").innerHTML =
        " <br>Model: " + m.model +
        "<br>Brand: " + getBrand(m.brand) +
        "<br>Price: ₹" + m.price +
        "<br>Stock: " + m.stock +
        "<br>Total Value: ₹" + (m.price * m.stock);
    });
}

</script>

</body>
</html>
