<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Search</title>

<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: #f4f4f4;
    }

    input{
        padding: 10px;
        width: 250px;
    }

    button{
        padding: 10px 15px;
        background-color: green;
        color: white;
        border: none;
        cursor: pointer;
    }

    .card{
        width: 300px;
        margin: 20px auto;
        padding: 15px;
        background: white;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }
</style>
</head>
<body>

<h2>Student Details Search</h2>

<input type="text" id="name" placeholder="Enter Student Name">
<button onclick="showDetails()">Search</button>

<div id="output"></div>

<script>

let students = [
    {id:101, name:"Arun", department:"CSE", mark:92},
    {id:102, name:"Priya", department:"IT", mark:85},
    {id:103, name:"Karthik", department:"ECE", mark:72},
    {id:104, name:"Divya", department:"EEE", mark:48},
    {id:105, name:"Rahul", department:"MECH", mark:60}
];

function grade(mark){
    if(mark >= 90) return "A";
    else if(mark >= 75) return "B";
    else if(mark >= 50) return "C";
    else return "Fail";
}

function showDetails(){

    let studentName = document.getElementById("name").value;
    let result = "";

    for(let i=0; i<students.length; i++){

        if(students[i].name.toLowerCase() === studentName.toLowerCase()){

            result = `
            <div class="card">
                <h3>${students[i].name}</h3>
                <p><b>ID:</b> ${students[i].id}</p>
                <p><b>Department:</b> ${students[i].department}</p>
                <p><b>Mark:</b> ${students[i].mark}</p>
                <p><b>Grade:</b> ${grade(students[i].mark)}</p>
            </div>`;
            break;
        }
    }

    if(result === ""){
        result = "<h3 style='color:red'>Student Not Found</h3>";
    }

    document.getElementById("output").innerHTML = result;
}

</script>

</body>
</html>
