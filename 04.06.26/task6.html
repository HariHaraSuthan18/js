<!DOCTYPE html>
<html>
<head>
    <title>Alert Message</title>
</head>
<body>

    <h2>Alert Message</h2>

    <button onclick="showMessage()">
        Show Message
    </button>

    <br><br>

    <h3 id="result"></h3>

    <script>

        function showMessage() {

            let course = "JavaScript";

            // Alert Popup
            alert("Welcome to " + course);

            // Screen Output
            document.getElementById("result").innerHTML =
                "Welcome to " + course;

            // Console Output
            console.log("Welcome to " + course);

            // Console Table
            console.table({
                Course: course,
                Message: "Welcome to " + course
            });
        }

    </script>

</body>
</html>
