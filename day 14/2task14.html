<!DOCTYPE html>
<html>
<head>
    <title>Railway Reservation System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .result{
            margin-top:20px;
            background:#f8f9fa;
            padding:15px;
            border-radius:10px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="container">

    <h2> Railway Reservation System</h2>

    <input type="number" id="seats" placeholder="Enter Seats To Book">

    <button onclick="bookTicket()">Book Seats</button>

    <div id="result" class="result">
        Available Seats: <b>50</b>
    </div>

</div>

<script>

    let availableSeats = 50;

    function bookSeats(requestedSeats){

        if(requestedSeats <= availableSeats){

            availableSeats -= requestedSeats;

            return `
                 Booking Successful <br>
                Seats Booked: ${requestedSeats} <br>
                Available Seats: ${availableSeats}
            `;
        }
        else{
            return `
                 Booking Rejected <br>
                Only ${availableSeats} Seats Available
            `;
        }
    }

    function bookTicket(){

        let seats = Number(document.getElementById("seats").value);

        document.getElementById("result").innerHTML =
            bookSeats(seats);
    }

</script>

</body>
</html>
