<!DOCTYPE html>
<html>
<head>
    <title>Cashback Offer Generator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#00c9ff,#92fe9d);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        button{
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        .offer{
            margin-top:15px;
            padding:12px;
            background:#f8f9fa;
            border-radius:8px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2> Cashback Offer Generator</h2>

    <button onclick="showOffer()">Get Next Offer</button>

    <div id="result"></div>

</div>

<script>

    // Generator Function
    function* cashbackOffers(){
        yield "10% Cashback";
        yield "20% Cashback";
        yield "Free Delivery";
        yield "Buy 1 Get 1";
    }

    let offers = cashbackOffers();

    function showOffer(){

        let offer = offers.next();

        if(!offer.done){
            document.getElementById("result").innerHTML +=
            `<div class="offer">${offer.value}</div>`;
        }
        else{
            document.getElementById("result").innerHTML +=
            `<div class="offer"> No More Offers Available</div>`;
        }
    }

</script>

</body>
</html>
