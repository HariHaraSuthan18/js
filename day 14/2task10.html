<!DOCTYPE html>
<html>
<head>
    <title>Hospital Patient Management</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        input{
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .result{
            margin-top: 15px;
            padding: 10px;
            background: #f8f8f8;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2> Hospital Patient Management</h2>

    <input type="text" id="patientName" placeholder="Patient Name">

    <input type="number" id="age" placeholder="Age">

    <input type="text" id="disease" placeholder="Disease">

    <input type="text" id="doctor" placeholder="Doctor Name">

    <button onclick="showDetails()">Show Details</button>

    <div id="result" class="result"></div>

</div>

<script>

function showDetails(){

    let patient = {
        patientName : document.getElementById("patientName").value,
        age : document.getElementById("age").value,
        disease : document.getElementById("disease").value,
        doctor : document.getElementById("doctor").value
    };

    let output = "<h3>Patient Details</h3>";

    // for-in loop
    for(let key in patient){
        output += key + " : " + patient[key] + "<br>";
    }

    // Destructuring
    let {patientName, age, disease, doctor} = patient;

    output += `
        <hr>
        <h3>Destructuring Output</h3>
        Patient Name : ${patientName}<br>
        Age : ${age}<br>
        Disease : ${disease}<br>
        Doctor : ${doctor}
    `;

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
